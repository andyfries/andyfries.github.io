name: Draft newsletter for new posts

on:
  push:
    branches: [main]
    paths:
      - "_posts/**"
  workflow_dispatch:
    inputs:
      post:
        description: "Post file, e.g. _posts/2026-07-18-slug.md (blank = most recent)"
        required: false
        default: ""
      send:
        description: "Send to subscribers now (unchecked = create a draft)"
        type: boolean
        default: false

# Avoid overlapping runs racing on the same push.
concurrency:
  group: newsletter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so github.event.before is always reachable, no matter
          # how many commits a single push contains.
          fetch-depth: 0

      - name: Determine posts to draft
        id: added
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: draft the named post, or the most recent one if blank.
            manual='${{ github.event.inputs.post }}'
            if [ -n "$manual" ]; then
              files="$manual"
            else
              files=$(find _posts -maxdepth 1 -type f \( -name '*.md' -o -name '*.markdown' \) \
                | sort | tail -1)
            fi
          else
            # Push: draft only posts newly ADDED in this push.
            before='${{ github.event.before }}'
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              range="HEAD^ HEAD"
            else
              range="$before ${{ github.sha }}"
            fi
            files=$(git diff --name-status --diff-filter=A $range -- '_posts/**' \
              | awk '{print $2}' | tr '\n' ' ')
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Posts to draft: $files"

      - name: Stop if nothing to draft
        if: steps.added.outputs.files == ''
        run: echo "No posts to draft; skipping."

      - name: Set up Ruby
        if: steps.added.outputs.files != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build site
        if: steps.added.outputs.files != ''
        run: JEKYLL_ENV=production bundle exec jekyll build

      - name: Send or draft newsletter
        if: steps.added.outputs.files != ''
        env:
          BUTTONDOWN_KEY: ${{ secrets.BUTTONDOWN_KEY }}
          # Push = ready to publish, so send. Manual dispatch drafts unless
          # you explicitly tick "send".
          BUTTONDOWN_STATUS: ${{ (github.event_name == 'push' || github.event.inputs.send == 'true') && 'about_to_send' || 'draft' }}
        run: python3 .github/scripts/send_newsletter.py ${{ steps.added.outputs.files }}
